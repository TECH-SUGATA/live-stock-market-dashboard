services:
  - type: web
    name: stockvision-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FINNHUB_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
